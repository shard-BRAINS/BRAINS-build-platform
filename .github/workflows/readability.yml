name: Readability gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  readability:
    name: Flesch-Kincaid grade check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      # textstat 0.7.4 imports the deprecated `pkg_resources` module,
      # which was removed from setuptools 78. Pin to 0.7.13 (latest 0.7.x)
      # which dropped the pkg_resources dependency.
      - name: Install textstat
        run: python -m pip install textstat==0.7.13

      - name: Verify textstat is importable
        run: python -c "import textstat; print('textstat OK:', textstat.__version__)"

      - name: Run readability check
        run: |
          python scripts/readability_check.py \
            --public-grade 8 \
            --technical-grade 10 \
            --paths "README.md" "docs/**/*.md"
