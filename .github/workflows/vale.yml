name: Vale (BRAINS prose)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  vale:
    name: Vale prose lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Vale
        uses: errata-ai/vale-action@85f9f7f2c5f449ac0ae5b66662961bae3f77ca6a # reviewdog
        with:
          version: 3.9.1
          files: '["README.md", "docs", "CONTRIBUTING.md", "SECURITY.md", "CODE_OF_CONDUCT.md"]'
          fail_on_error: false
          filter_mode: nofilter
          reporter: github-pr-review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
